<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rapportserier – NB</title>
<style>
/* ── Reset & base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --nb-blue:    #1F4E79;
  --nb-light:   #EBF3FB;
  --nb-mid:     #2E75B6;
  --green:      #1a7a45;
  --green-bg:   #d4edda;
  --orange:     #a04000;
  --orange-bg:  #fdebd0;
  --red:        #922b21;
  --red-bg:     #fadbd8;
  --gray:       #6c757d;
  --gray-bg:    #f1f3f5;
  --border:     #dde3ef;
  --sidebar-w:  300px;
  --topbar-h:   56px;
}
html, body { height: 100%; font-family: Arial, sans-serif; font-size: 14px; color: #1a1a2e; background: #f4f6fa; }

/* ── Top bar ── */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; height: var(--topbar-h);
  background: var(--nb-blue); color: white;
  display: flex; align-items: center; gap: 16px; padding: 0 20px;
  z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}
.topbar h1 { font-size: 16px; font-weight: 700; letter-spacing: 0.2px; }
.topbar-meta { font-size: 11px; opacity: 0.7; margin-top: 2px; }
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.topbar .btn { padding: 6px 14px; font-size: 12px; }

/* ── Layout ── */
.layout {
  display: flex;
  margin-top: var(--topbar-h);
  height: calc(100vh - var(--topbar-h));
}

/* ── Sidebar ── */
.sidebar {
  width: var(--sidebar-w);
  flex-shrink: 0;
  background: white;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.sidebar-search {
  padding: 12px;
  border-bottom: 1px solid var(--border);
}
.sidebar-search input {
  width: 100%;
  border: 1px solid #ccc;
  border-radius: 6px;
  padding: 7px 10px;
  font-size: 13px;
}
.sidebar-list {
  overflow-y: auto;
  flex: 1;
}
.sidebar-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 14px;
  cursor: pointer;
  border-bottom: 1px solid #f5f5f5;
  transition: background 0.1s;
}
.sidebar-item:hover { background: #f8f9ff; }
.sidebar-item.active { background: var(--nb-light); border-left: 3px solid var(--nb-blue); }
.sidebar-item .dot {
  width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; margin-top: 4px;
}
.dot-ok { background: #27ae60; }
.dot-warn { background: #e67e22; }
.dot-unknown { background: #bdc3c7; }
.dot-error { background: var(--red); }
.diff-badge {
  display: inline-block; margin-left: 5px;
  background: var(--orange-bg); color: var(--orange);
  font-size: 10px; font-weight: 700; padding: 1px 5px;
  border-radius: 10px; vertical-align: middle;
}
.sidebar-item-text { flex: 1; min-width: 0; }
.sidebar-item-name { font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sidebar-item-sub { font-size: 11px; color: var(--gray); margin-top: 2px; }
.sidebar-add {
  padding: 12px; border-top: 1px solid var(--border);
  text-align: center;
}

/* ── Main content ── */
.main {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* ── Home / overview ── */
.stat-row { display: flex; gap: 14px; flex-wrap: wrap; }
.stat-card {
  background: white; border-radius: 10px; border: 1px solid var(--border);
  padding: 16px 22px; min-width: 140px; flex: 1;
  display: flex; flex-direction: column; align-items: center;
}
.stat-card .num { font-size: 32px; font-weight: 800; color: var(--nb-blue); }
.stat-card.ok .num { color: var(--green); }
.stat-card.warn .num { color: var(--orange); }
.stat-card .lbl { font-size: 12px; color: var(--gray); margin-top: 3px; text-align: center; }

/* ── Cards ── */
.card {
  background: white; border-radius: 10px; border: 1px solid var(--border);
  overflow: hidden;
}
.card-header {
  padding: 16px 20px;
  display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid var(--border);
}
.card-header h2 { font-size: 16px; font-weight: 700; }
.card-header .sub { font-size: 12px; color: var(--gray); margin-top: 2px; }
.card-body { padding: 16px 20px; }

/* ── Badges ── */
.badge {
  font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 10px;
  white-space: nowrap;
}
.badge-ok { background: var(--green-bg); color: var(--green); }
.badge-warn { background: var(--orange-bg); color: var(--orange); }
.badge-error { background: var(--red-bg); color: var(--red); }
.badge-info { background: var(--nb-light); color: var(--nb-blue); }
.badge-gray { background: var(--gray-bg); color: var(--gray); }

/* ── Buttons ── */
.btn {
  border: none; border-radius: 6px; cursor: pointer;
  font-size: 13px; font-weight: 600;
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; transition: background 0.15s;
}
.btn-primary { background: var(--nb-blue); color: white; }
.btn-primary:hover { background: #163a5c; }
.btn-secondary { background: #e8eef7; color: var(--nb-blue); }
.btn-secondary:hover { background: #d0ddf0; }
.btn-danger { background: var(--red-bg); color: var(--red); }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn:disabled { opacity: 0.45; cursor: not-allowed; }

/* ── Table ── */
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { background: var(--gray-bg); text-align: left; padding: 8px 12px; font-weight: 600; color: #555; border-bottom: 2px solid var(--border); }
td { padding: 8px 12px; border-bottom: 1px solid #f0f0f0; vertical-align: top; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #fafbff; }
a { color: var(--nb-blue); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ── Year chart ── */
.year-chart { display: flex; align-items: flex-end; gap: 3px; height: 80px; margin-top: 10px; }
.year-bar-wrap { display: flex; flex-direction: column; align-items: center; flex: 1; }
.year-bar {
  background: var(--nb-blue); border-radius: 3px 3px 0 0;
  width: 100%; transition: height 0.3s; cursor: default;
  min-height: 2px;
}
.year-bar:hover { background: var(--nb-mid); }
.year-label { font-size: 9px; color: var(--gray); margin-top: 3px; transform: rotate(-45deg); }

/* ── Progress bar ── */
.progress-wrap { background: #e9ecef; border-radius: 4px; height: 8px; overflow: hidden; }
.progress-bar { height: 100%; border-radius: 4px; background: var(--nb-blue); transition: width 0.4s; }

/* ── Status pills in overview table ── */
.status-pill {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 12px; font-weight: 600;
}

/* ── Spinner ── */
.spinner {
  display: inline-block; width: 14px; height: 14px;
  border: 2px solid #ccc; border-top-color: var(--nb-blue);
  border-radius: 50%; animation: spin 0.7s linear infinite;
  vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Publisher PDF list ── */
.pdf-list { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
.pdf-row {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 6px 10px; border-radius: 6px; font-size: 13px;
}
.pdf-row.missing { background: var(--orange-bg); border: 1px solid #f0c080; }
.pdf-row.present { background: var(--green-bg); border: 1px solid #b2dfcb; }
.pdf-row.unknown { background: var(--gray-bg); border: 1px solid #ddd; }

/* ── Mangler-tabell ── */
.mangler-table { width:100%; border-collapse:collapse; font-size:12px; margin-top:8px; }
.mangler-table th { background:var(--orange-bg); color:var(--orange); padding:6px 10px; text-align:left; font-weight:700; border-bottom:2px solid #f0c080; position:sticky;top:0; }
.mangler-table td { padding:6px 10px; border-bottom:1px solid #f5ebe0; vertical-align:middle; }
.mangler-table tr:last-child td { border-bottom:none; }
.mangler-table tr:hover td { background:#fef6ee; }
.mangler-table .actions { display:flex; gap:6px; flex-wrap:wrap; }
.check-running { display:flex; align-items:center; gap:10px; padding:20px; color:var(--gray); font-size:13px; }
.check-progress { font-size:12px; color:var(--gray); margin-top:4px; }
.scroll-box { border:1px solid var(--border); border-radius:8px; overflow-y:auto; max-height:520px; }
.scroll-box table { width:100%; }
.check-box { border:1px solid var(--border); border-radius:8px; padding:0; max-height:520px; overflow-y:auto; }

/* ── Empty / loading states ── */
.empty { text-align: center; padding: 40px 20px; color: var(--gray); font-size: 13px; }
.loading { text-align: center; padding: 30px; color: var(--gray); }

/* ── Two-column grid ── */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
@media (max-width: 900px) { .two-col { grid-template-columns: 1fr; } }

.section-label { font-size: 11px; font-weight: 700; color: var(--gray); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }

/* ── ISSN tag ── */
.issn-tag { font-family: monospace; font-size: 12px; background: var(--gray-bg); padding: 2px 7px; border-radius: 4px; }

/* ── Notification toast ── */
.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: #1a1a2e; color: white;
  padding: 12px 18px; border-radius: 8px;
  font-size: 13px; box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  animation: fadeIn 0.3s;
  z-index: 999;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

/* ── Overview table clickable ── */
.clickable { cursor: pointer; }
.clickable:hover .serie-name-link { color: var(--nb-mid); text-decoration: underline; }
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <div>
    <div class="topbar-meta" style="font-size:13px;opacity:1;font-weight:700;">📚 Nasjonalbiblioteket</div>
    <h1>Rapportserier – innleveringsoppfølging</h1>
  </div>
  <div class="topbar-right">
    <span id="last-check" style="font-size:11px;opacity:0.7;"></span>
    <button class="btn btn-secondary" onclick="lastNedAlleMangler()" style="background:rgba(255,255,255,0.15);color:white;border:1px solid rgba(255,255,255,0.3);">⬇ Last ned alle mangler</button>
    <button class="btn btn-secondary" onclick="visOverview()" style="background:rgba(255,255,255,0.15);color:white;border:1px solid rgba(255,255,255,0.3);">🏠 Oversikt</button>
    <button class="btn btn-secondary" id="btn-pause" onclick="togglePause()" style="display:none;background:rgba(255,255,255,0.15);color:white;border:1px solid rgba(255,255,255,0.3);">⏸ Pause</button>
    <button class="btn btn-primary" onclick="oppdaterAlle()" id="btn-oppdater" style="background:#2E75B6;">🔄 Oppdater alle</button>
  </div>
</div>

<!-- Layout -->
<div class="layout">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-search">
      <input type="text" id="sidebar-search" placeholder="Søk på serie…" oninput="filterSidebar()">
    </div>
    <div class="sidebar-list" id="sidebar-list">
      <div class="loading"><span class="spinner"></span> Laster serier…</div>
    </div>
    <div class="sidebar-add">
      <small style="color:var(--gray);">Rediger <strong>serier.json</strong> og push til GitHub for å legge til serier</small>
    </div>
  </div>

  <!-- Main -->
  <div class="main" id="main-content">
    <div class="loading"><span class="spinner"></span> Laster inn…</div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────────
let SERIER = [];          // config fra serier.json
let NB_CACHE = {};        // issnPrint → { total, latestYear, items[], byYear:{} }
let CHECK_CACHE = {};     // serieName → { loading, result, error, startedAt }
let ACTIVE_SERIE = null;  // navn på valgt serie
let SESSION_DIFF = {};    // serieName → diff fra siste oppdatering i denne sesjonen
const STATUS_DATA = null; // ikke brukt i GitHub Pages-versjon

const NB_CACHE_KEY = 'nb_rapportserier_cache_v1';

function lagreNBCache() {
  try { localStorage.setItem(NB_CACHE_KEY, JSON.stringify(NB_CACHE)); } catch(e) {}
}
function lasterNBCache() {
  try {
    const raw = localStorage.getItem(NB_CACHE_KEY);
    if (raw) NB_CACHE = JSON.parse(raw);
  } catch(e) {}
}

// ── Init (GitHub Pages – ingen server) ────────────────────────────────────────
async function init() {
  // Gjenopprett cacher fra localStorage (brukerens egne, nyeste sjekker)
  lasterNBCache();
  lasterSjekkCache();

  // Last konfig fra serier.json
  try {
    const r = await fetch('serier.json');
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    SERIER = await r.json();
  } catch(e) {
    toast('Klarte ikke laste serier.json – sjekk at filen finnes i repoet');
    SERIER = [];
  }

  // Last forhåndslagrede sjekk-resultater (delt i to filer for å holde < 25 MB per fil)
  // localStorage-data (nyere egne sjekker) har alltid prioritet
  try {
    const deler = await Promise.all(
      ['sjekk_cache_a.json', 'sjekk_cache_b.json'].map(f =>
        fetch(f).then(r => r.ok ? r.json() : {}).catch(() => ({}))
      )
    );
    let lastet = 0;
    for (const del of deler) {
      for (const [name, result] of Object.entries(del)) {
        if (!CHECK_CACHE[name]) {
          CHECK_CACHE[name] = { loading: false, result, error: null };
          lastet++;
        }
      }
    }
    if (lastet > 0) console.log(`Lastet ${lastet} sjekk-resultater fra cache`);
  } catch(e) {}

  renderSidebar();
  visOverview();
}


// ── Sidebar ────────────────────────────────────────────────────────────────────
function renderSidebar() {
  const q = (document.getElementById('sidebar-search')?.value || '').toLowerCase();
  const list = document.getElementById('sidebar-list');
  const active = SERIER.filter(s => s.active !== false);
  const filtered = active.filter(s =>
    !q || s.name.toLowerCase().includes(q) || s.publisher.toLowerCase().includes(q)
  );

  if (!filtered.length) {
    list.innerHTML = '<div class="empty">Ingen serier funnet.</div>';
    return;
  }

  list.innerHTML = filtered.map(serie => {
    const nb  = NB_CACHE[serie.issnPrint || serie.name];
    const cc  = CHECK_CACHE[serie.name];
    const st  = getStatus(serie);
    const dotClass = { ok:'dot-ok', warn:'dot-warn', unknown:'dot-unknown', error:'dot-error' }[st] || 'dot-unknown';
    const isActive = ACTIVE_SERIE === serie.name;
    const countTxt = nb ? `${nb.total.toLocaleString('nb-NO')} poster` : 'Ikke hentet';

    // Timestamp: bruk sjekket-tid fra CHECK_CACHE, ellers lagret-tid fra NB_CACHE
    const tidpunkt = cc?.result?.checkedAt || nb?.lagretTid;
    const tidTxt = tidpunkt ? new Date(tidpunkt).toLocaleDateString('nb-NO', { day:'2-digit', month:'2-digit' }) : '';

    // Diff-badge fra denne sesjonen
    const diff = SESSION_DIFF[serie.name];
    let diffBadge = '';
    if (diff) {
      const endr = [];
      if (diff.nyeMangler  > 0) endr.push(`+${diff.nyeMangler}`);
      if (diff.lostMangler > 0) endr.push(`−${diff.lostMangler}`);
      if (endr.length) diffBadge = `<span class="diff-badge">${endr.join(' ')}</span>`;
    }

    return `<div class="sidebar-item${isActive ? ' active' : ''}" onclick="visSerie('${esc(serie.name)}')">
      <div class="dot ${dotClass}"></div>
      <div class="sidebar-item-text">
        <div class="sidebar-item-name" title="${esc(serie.name)}">${serie.name}${diffBadge}</div>
        <div class="sidebar-item-sub">${serie.publisher} · ${countTxt}${tidTxt ? ' · ' + tidTxt : ''}</div>
      </div>
    </div>`;
  }).join('');
}

function filterSidebar() { renderSidebar(); }

// ── Overview ───────────────────────────────────────────────────────────────────
function visOverview() {
  ACTIVE_SERIE = null;
  renderSidebar();
  const main = document.getElementById('main-content');
  const active = SERIER.filter(s => s.active !== false);
  const hentet = active.filter(s => NB_CACHE[s.issnPrint]);
  const totPoster = Object.values(NB_CACHE).reduce((a, v) => a + (v.total || 0), 0);
  const warn = active.filter(s => getStatus(s) === 'warn').length;
  const ok = active.filter(s => getStatus(s) === 'ok').length;

  const tableRows = active.map(serie => {
    const nb = NB_CACHE[serie.issnPrint || serie.name];
    const cc = CHECK_CACHE[serie.name];
    const st = getStatus(serie);
    const dotC = { ok:'dot-ok', warn:'dot-warn', unknown:'dot-unknown' }[st] || 'dot-unknown';
    const issnFmt = serie.issnPrint ? serie.issnPrint.replace(/(\d{4})(\d{4})/,'$1-$2') : '–';

    // Mangeltall-kolonne
    let stHtml;
    if (cc?.loading) {
      stHtml = `<span style="color:var(--gray)"><span class="spinner"></span></span>`;
    } else if (cc?.result) {
      const n = cc.result.mangler?.length || 0;
      stHtml = n === 0
        ? `<span style="color:var(--green);font-weight:600;">✓ 0</span>`
        : `<span style="color:var(--orange);font-weight:700;">${n} mangler</span>`;
    } else if (cc?.error) {
      stHtml = `<span style="color:var(--red);font-size:11px;" title="${esc(cc.error)}">Feil</span>`;
    } else {
      stHtml = `<span style="color:var(--gray);">–</span>`;
    }

    return `<tr class="clickable" onclick="visSerie('${esc(serie.name)}')">
      <td><span class="dot ${dotC}" style="display:inline-block;margin-right:7px;"></span><span class="serie-name-link" style="font-weight:600;">${serie.name}</span></td>
      <td>${serie.publisher}</td>
      <td><span class="issn-tag">${issnFmt}</span></td>
      <td>${nb ? nb.total.toLocaleString('nb-NO') : '–'}</td>
      <td>${nb ? (nb.latestYear || '–') : '–'}</td>
      <td>${stHtml}</td>
      <td><button class="btn btn-secondary btn-sm" onclick="event.stopPropagation();hentNB('${esc(serie.issnPrint)}','${esc(serie.name)}')">Hent</button></td>
    </tr>`;
  }).join('');

  main.innerHTML = `
    <div class="stat-row">
      <div class="stat-card"><div class="num">${active.length}</div><div class="lbl">Serier overvåket</div></div>
      <div class="stat-card ok"><div class="num">${ok}</div><div class="lbl">Fullt innlevert</div></div>
      <div class="stat-card warn"><div class="num">${warn}</div><div class="lbl">Mulige mangler</div></div>
      <div class="stat-card"><div class="num">${totPoster.toLocaleString('nb-NO')}</div><div class="lbl">Poster totalt i NB</div></div>
    </div>

    <div class="card">
      <div class="card-header">
        <div>
          <h2>Alle rapportserier</h2>
          <div class="sub">${hentet.length} av ${active.length} sjekket mot NB-katalog · Klikk på en rad for detaljer</div>
        </div>
      </div>
      <div style="overflow-x:auto;">
        <table>
          <thead><tr>
            <th>Serie</th><th>Utgiver</th><th>ISSN</th><th>NB-poster</th><th>Siste år</th><th>Status</th><th></th>
          </tr></thead>
          <tbody>${tableRows}</tbody>
        </table>
      </div>
    </div>

    ${STATUS_DATA ? `<div class="card">
      <div class="card-header"><h2>Siste fullstendige sjekk</h2><div class="sub">${fmtDato(STATUS_DATA.generatedAt)}</div></div>
      <div class="card-body">
        <p style="color:var(--gray);font-size:13px;">Kjørt via <code>sjekk_rapportserier.py</code>.
        ${STATUS_DATA.serier?.filter(s=>s.mangler?.length>0).length || 0} serie(r) med mulige mangler funnet.</p>
      </div>
    </div>` : ''}
  `;
}

// ── Serie-detaljvisning ────────────────────────────────────────────────────────
async function visSerie(name) {
  ACTIVE_SERIE = name;
  renderSidebar();
  const serie = SERIER.find(s => s.name === name);
  if (!serie) return;

  const main = document.getElementById('main-content');
  main.innerHTML = `<div class="loading"><span class="spinner"></span> Laster data for <strong>${serie.name}</strong>…</div>`;

  // Hent NB-data om ikke cachet (fallback: tittel → Alma SRU)
  const cacheKey = serie.issnPrint || serie.name;
  if (!NB_CACHE[cacheKey]) {
    await hentNBOgVent(serie.issnPrint, serie.name, serie.mmsId || '');
  }

  renderSerieView(serie);
}

function renderSerieView(serie) {
  const main = document.getElementById('main-content');
  const nb = NB_CACHE[serie.issnPrint || serie.name] || {};
  const statusData = STATUS_DATA?.serier?.find(s => s.name === serie.name);
  const issnFmt = s => s ? s.replace(/(\d{4})(\d{4})/, '$1-$2') : '–';

  // Year-by-year chart
  const byYear = nb.byYear || {};
  const years = Object.keys(byYear).sort();
  const maxCount = Math.max(...Object.values(byYear), 1);
  const chartHtml = years.length > 0 ? `
    <div class="year-chart">
      ${years.map(y => {
        const h = Math.max(4, Math.round((byYear[y] / maxCount) * 72));
        return `<div class="year-bar-wrap" title="${y}: ${byYear[y]} poster">
          <div class="year-bar" style="height:${h}px"></div>
          <div class="year-label">${y}</div>
        </div>`;
      }).join('')}
    </div>` : '';

  // Recent items table
  const items = nb.items || [];
  const itemsHtml = items.length > 0 ? `
    <div class="scroll-box">
      <table>
        <thead><tr><th>Tittel</th><th>År</th><th>Oria</th></tr></thead>

function renderPublisherSection(serie, checkState, statusData) {
  // Prioritér live CHECK_CACHE, fall back til lagret STATUS_DATA
  const result = checkState?.result || (statusData ? {
    mangler: statusData.mangler || [],
    publisher: {
      jsRendered: statusData.publisher_data?.js_rendered,
      error: statusData.publisher_data?.error,
      totalFunnet: (statusData.publisherPdfs || []).length,
    },
    nb: statusData.nb || {},
  } : null);

  if (checkState?.loading) {
    return `<div class="check-running">
      <span class="spinner" style="width:20px;height:20px;border-width:3px;"></span>
      <div>
        <div style="font-weight:600;">Sjekker utgivers nettside…</div>
        <div class="check-progress">Henter publikasjonsliste og sammenligner mot NB. Dette kan ta 1–2 minutter.</div>
      </div>
    </div>`;
  }

  if (checkState?.error) {
    return `<div class="badge badge-error" style="margin-bottom:10px;">Feil under sjekk</div>
    <p style="font-size:13px;color:var(--red);margin-top:8px;">${checkState.error}</p>
    <a href="${serie.publisherUrl}" target="_blank" class="btn btn-secondary btn-sm" style="margin-top:10px;">🌐 Åpne manuelt</a>`;
  }

  if (!result) {
    return `<div style="color:var(--gray);font-size:13px;margin-bottom:14px;">
      Trykk «Kjør sjekk» for å søke gjennom utgivers nettside og finne rapporter som ikke er avlevert til NB.
    </div>
    <a href="${serie.publisherUrl}" target="_blank" class="btn btn-secondary btn-sm">🌐 Åpne ${serie.publisher}s nettside</a>`;
  }

  const pub = result.publisher || {};
  const mangler = result.mangler || [];

  if (pub.jsRendered) {
    return `<div class="badge badge-gray" style="margin-bottom:10px;">Siden er JavaScript-rendret</div>
    <p style="font-size:13px;color:var(--gray);margin-top:8px;">Kan ikke sjekkes automatisk. Åpne manuelt og se etter nye hefter.</p>
    <a href="${serie.publisherUrl}" target="_blank" class="btn btn-secondary btn-sm" style="margin-top:10px;">🌐 Åpne ${serie.publisher}s nettside</a>`;
  }

  if (pub.error) {
    return `<div class="badge badge-error">Feil: ${pub.error}</div>`;
  }

  const antallFunnet = pub.totalFunnet || 0;
  const nbAar = result.nb?.latestYear || '?';

  if (mangler.length === 0) {
    return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
      <span class="badge badge-ok">✓ Ingen mangler funnet</span>
      <span style="font-size:12px;color:var(--gray);">${antallFunnet} publikasjoner sjekket</span>
    </div>
    <p style="font-size:13px;color:var(--gray);">Alle rapporter på utgivers nettside ser ut til å være registrert i NB (siste NB-år: ${nbAar}).</p>
    <a href="${serie.publisherUrl}" target="_blank" class="btn btn-secondary btn-sm" style="margin-top:10px;">🌐 Åpne ${serie.publisher}s nettside</a>`;
  }

  // Grupper mangler per år
  const perAar = {};
  for (const m of mangler) {
    const y = m.year || '?';
    if (!perAar[y]) perAar[y] = [];
    perAar[y].push(m);
  }
  const sorterteAar = Object.keys(perAar).sort((a,b) => b.localeCompare(a));

  // Lagre sortert rekkefølge for per-rad nedlasting
  const _sortert = sorterteAar.flatMap(aar => perAar[aar]);
  MANGLER_STORE[serie.name] = _sortert;

  let _rowIdx = 0;
  const tabellRader = sorterteAar.flatMap(aar =>
    perAar[aar].map(m => {
      const myIdx = _rowIdx++;
      const pdfLink = m.pdfUrl
        ? `<a href="${m.pdfUrl}" target="_blank" class="btn btn-secondary btn-sm" style="white-space:nowrap;">⬇ PDF</a>`
        : '';
      const sideLink = m.url
        ? `<a href="${m.url}" target="_blank" class="btn btn-secondary btn-sm" style="white-space:nowrap;">↗ Side</a>`
        : '';
      const jsonBtn = `<button class="btn btn-secondary btn-sm" style="white-space:nowrap;" title="Last ned metadata som JSON" onclick="lastNedEnkeltJSON('${esc(serie.name)}',${myIdx})">{ }</button>`;
      return `<tr>
        <td>${m.title || '–'}</td>
        <td style="white-space:nowrap;">${m.rapportNr || '–'}</td>
        <td style="text-align:center;">${aar}</td>
        <td><div class="actions">${pdfLink}${sideLink}${jsonBtn}</div></td>
      </tr>`;
    })
  ).join('');

  return `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap;">
      <span class="badge badge-warn">⚠ ${mangler.length} mulige mangler</span>
      <span style="font-size:12px;color:var(--gray);">av ${antallFunnet} sjekket · NB siste år: ${nbAar}</span>
      <a href="${serie.publisherUrl}" target="_blank" style="font-size:12px;margin-left:auto;">🌐 Utgivers nettside</a>
      <button class="btn btn-secondary btn-sm" onclick="lastNedJSON('${esc(serie.name)}')" title="Last ned metadata for manglende rapporter som JSON">⬇ JSON</button>
    </div>
    <div class="check-box" id="mangler-scroll-${encodeURIComponent(serie.name)}">
      <table class="mangler-table">
        <thead><tr><th>Tittel</th><th>Rapport nr.</th><th style="text-align:center;">År</th><th>Lenker</th></tr></thead>
        <tbody>${tabellRader}</tbody>

    <div style="margin-top:8px;font-size:11px;color:var(--gray);">

    </div>`;
}

// ── NVA API – direkte kall fra nettleseren ─────────────────────────────────────
const NVA_API = 'https://api.nva.unit.no/search/resources';
// CORS-proxy brukes om direkte kall blokkeres (GitHub Pages → NVA).
// Sett til '' for å deaktivere proxy-fallback.
const CORS_PROXY = 'https://corsproxy.io/?url=';

async function nvaFetch(url) {
  // 1. Prøv direkte
  try {
    const r = await fetch(url);
    if (r.ok) return r.json();
  } catch(e) { /* sannsynligvis CORS-feil */ }
  // 2. Fall tilbake til proxy
  if (!CORS_PROXY) throw new Error('NVA API ikke tilgjengelig (CORS)');
  const r = await fetch(CORS_PROXY + encodeURIComponent(url));
  if (!r.ok) throw new Error(`NVA via proxy: HTTP ${r.status}`);
  return r.json();
}

async function hentNVADirekte(utgiver, serietittel, issn) {
  const alle = [];
  let fra = 0, total = 0;
  const issnClean = (issn || '').replace(/-/g, '');
  do {
    const params = new URLSearchParams({ publisher: utgiver, size: 100, from: fra, aggregation: 'none' });
    const data = await nvaFetch(`${NVA_API}?${params}`);
    total = data.totalHits || 0;
    const hits = data.hits || [];
    if (!hits.length) break;

    for (const hit of hits) {
      const entity = hit.entityDescription || {};
      const ref    = entity.reference || {};
      const ctx    = ref.publicationContext || {};
      const serie  = (ctx.series && typeof ctx.series === 'object') ? ctx.series : {};

      const serieNavn        = serie.name || '';
      const serieIssn        = (serie.printIssn  || '').replace(/-/g, '');
      const serieIssnOnline  = (serie.onlineIssn || '').replace(/-/g, '');

      // Filtrer på serie (tittel eller ISSN)
      if (serietittel && serieNavn) {
        const sN = serieNavn.toLowerCase(), sT = serietittel.toLowerCase();
        if (!sN.includes(sT) && !sT.includes(sN)) {
          if (issnClean && serieIssn && issnClean !== serieIssn) continue;
          else if (!issnClean) continue;
        }
      }

      const title      = entity.mainTitle || '–';
      const year       = entity.publicationDate?.year || '–';
      const serieNr    = ctx.seriesNumber || '';
      const isbnListe  = (ctx.isbnList || []).map(i => i.replace(/-/g, '')).filter(Boolean);
      const identifier = hit.identifier || '';
      const nvaUrl     = identifier ? `https://nva.sikt.no/registration/${identifier}` : '';

      let pdfUrl = null, pubUrl = null, hasNvaFile = false;
      for (const art of hit.associatedArtifacts || []) {
        if (['OpenFile','PublishedFile'].includes(art.type)) hasNvaFile = true;
        else if (art.type === 'AssociatedLink') {
          const aid = art.id || '';
          if (aid.toLowerCase().endsWith('.pdf')) pdfUrl = pdfUrl || aid;
          else if (aid && !pubUrl) pubUrl = aid;
        }
      }
      const handleUrl  = (hit.additionalIdentifiers || []).find(a => a.type === 'HandleIdentifier')?.value || '';
      const cristinId  = (hit.additionalIdentifiers || []).find(a => a.type === 'CristinIdentifier')?.value || '';
      if (hasNvaFile && !pdfUrl) pdfUrl = handleUrl || nvaUrl;

      const contributors = (entity.contributors || []).map(c => ({
        name: c.identity?.name || '', role: c.role?.type || '',
        sequence: c.sequence || '', orcid: c.identity?.orcId || '',
        cristinId: (c.identity?.id || '').split('/').pop(),
      }));

      alle.push({
        nvaId: identifier, title, year,
        rapportNr: serieNr,
        isbn: isbnListe[0] || '', isbnListe,
        seriesName: serieNavn, seriesIssnPrint: serieIssn, seriesIssnOnline: serieIssnOnline,
        publisherName: ctx.publisher?.name || '',
        publicationType: ref.publicationInstance?.type || '',
        pages: ref.publicationInstance?.pages?.pages || '',
        language: (entity.language || '').split('/').pop(),
        abstract: entity.abstract || '',
        contributors, pdfUrl,
        url: pubUrl || nvaUrl, nvaUrl, handleUrl, cristinId,
        kilde: 'nva',
      });
    }
    fra += 100;
  } while (fra < total && alle.length < 500);
  return alle;
}

// ── finn_mangler (JavaScript-port av Python-funksjonen) ────────────────────────
function finnManglerJS(nb, nvaItems, serie) {
  if (!nvaItems.length) return [];

  const nbTitler    = (nb.items || []).map(i => (i.title || '').toLowerCase());
  const nbIsbn      = new Set((nb.items || []).map(i => (i.isbn || '').replace(/-/g, '')).filter(Boolean));
  const nbLatest    = nb.latestYear || 0;

  // Rapportnumre fra NB-titler (f.eks. "2025:12")
  const nbRapportNr = new Set();
  for (const t of nbTitler)
    for (const m of t.matchAll(/(\d{4}:\d+)/g)) nbRapportNr.add(m[1]);

  function likhet(a, b) {
    const wa = new Set(a.split(/\s+/).filter(Boolean));
    const wb = new Set(b.split(/\s+/).filter(Boolean));
    if (!wa.size || !wb.size) return 0;
    let i = 0; for (const w of wa) if (wb.has(w)) i++;
    return i / Math.max(wa.size, wb.size);
  }

  const mangler = [];
  for (const k of nvaItems) {
    const t   = (k.title || '').toLowerCase();
    const url = k.pdfUrl || k.url || '';

    if (k.rapportNr && nbRapportNr.has(k.rapportNr)) continue;

    const isbnInUrl = (url.match(/97[89]\d{10}/) || [])[0];
    if (isbnInUrl && nbIsbn.has(isbnInUrl)) continue;

    const isbn = (k.isbn || '').replace(/-/g, '');
    if (isbn && nbIsbn.has(isbn)) continue;

    if (t && nbTitler.some(nt => likhet(t, nt) > 0.55)) continue;

    const year = parseInt(k.year) || 0;
    if (year && nbLatest && year < nbLatest - 2) continue;

    const post = { ...k };
    if (serie.issnPrint   && !post.seriesIssnPrint)  post.seriesIssnPrint  = serie.issnPrint;
    if (serie.issnDigital && !post.seriesIssnOnline) post.seriesIssnOnline = serie.issnDigital;
    mangler.push(post);
  }
  return mangler.slice(0, 500);
}

// ── Diff (beregnes klient-side) ────────────────────────────────────────────────
function beregnDiff(gammelt, nytt) {
  function key(m) { return m.nvaId || m.url || `${m.title}|${m.year}`; }
  if (!gammelt) return { forsteGang: true, nyeMangler: 0, lostMangler: 0, nbEndring: 0 };
  const gKeys = new Set((gammelt.mangler || []).map(key));
  const nKeys = new Set((nytt.mangler    || []).map(key));
  return {
    forsteGang:  false,
    nyeMangler:  nytt.mangler.filter(m => !gKeys.has(key(m))).length,
    lostMangler: (gammelt.mangler || []).filter(m => !nKeys.has(key(m))).length,
    nbEndring:   (nytt.nb?.total || 0) - (gammelt.nb?.total || 0),
  };
}

// ── localStorage for sjekk-cache ───────────────────────────────────────────────
const SJEKK_CACHE_KEY = 'nb_sjekk_cache_v1';
function lagreSjekkCache() {
  try { localStorage.setItem(SJEKK_CACHE_KEY, JSON.stringify(CHECK_CACHE)); } catch(e) {}
}
function lasterSjekkCache() {
  try {
    const raw = localStorage.getItem(SJEKK_CACHE_KEY);
    if (raw) CHECK_CACHE = JSON.parse(raw);
  } catch(e) {}
}

// ── kjorSjekk – henter NVA direkte og sammenligner i nettleseren ───────────────
async function kjorSjekk(name) {
  const gammeltResultat = CHECK_CACHE[name]?.result || null;
  CHECK_CACHE[name] = { loading: true, result: gammeltResultat, error: null, startedAt: new Date() };

  const serie = SERIER.find(s => s.name === name);
  if (serie && ACTIVE_SERIE === name) {
    const bodyEl = document.getElementById(`pub-body-${encodeURIComponent(name)}`);
    const btnEl  = document.getElementById(`btn-sjekk-${encodeURIComponent(name)}`);
    if (bodyEl) bodyEl.innerHTML = renderPublisherSection(serie, CHECK_CACHE[name], null);
    if (btnEl)  { btnEl.disabled = true; btnEl.innerHTML = '<span class="spinner"></span> Sjekker…'; }
  }

  try {
    if (!serie?.publisher) throw new Error('Ingen NVA-utgiver konfigurert for denne serien');

    const cacheKey = serie.issnPrint || serie.name;
    const nb = NB_CACHE[cacheKey] || { total: 0, items: [], latestYear: null };

    const nvaItems = await hentNVADirekte(serie.publisher, serie.name, serie.issnPrint);
    const mangler  = finnManglerJS(nb, nvaItems, serie);

    const result = {
      name,
      checkedAt: new Date().toISOString(),
      nb: { total: nb.total, latestYear: nb.latestYear },
      publisher: { jsRendered: false, error: null, totalFunnet: nvaItems.length },
      mangler,
    };

    const diff = beregnDiff(gammeltResultat, result);
    result.diff = diff;

    CHECK_CACHE[name] = { loading: false, result, error: null };
    lagreSjekkCache();

    if (!diff.forsteGang) {
      SESSION_DIFF[name] = diff;
      const endr = [];
      if (diff.nyeMangler  > 0) endr.push(`+${diff.nyeMangler} nye mangler`);
      if (diff.lostMangler > 0) endr.push(`−${diff.lostMangler} løste mangler`);
      if (endr.length) toast(`${name}: ${endr.join(', ')}`);
    } else {
      delete SESSION_DIFF[name];
    }
  } catch(e) {
    CHECK_CACHE[name] = { loading: false, result: gammeltResultat, error: e.message };
    lagreSjekkCache();
  }

  renderSidebar();
  if (ACTIVE_SERIE === name && serie) {
    renderSerieView(serie);
    requestAnimationFrame(() => {
      const el = document.getElementById(`mangler-scroll-${encodeURIComponent(name)}`);
      if (el) el.scrollTop = el.scrollHeight;
    });
  }
}

const MANGLER_STORE = {};


function lastNedEnkeltJSON(name, idx) {
  const liste = MANGLER_STORE[name];
  if (!liste || !liste[idx]) { alert('Data ikke tilgjengelig.'); return; }
  const m = liste[idx];
  const filnavn = `${(m.rapportNr || m.year || 'rapport').replace(/[^a-zA-Z0-9æøåÆØÅ:_-]/g, '_')}.json`;
  const blob = new Blob([JSON.stringify(m, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = filnavn; a.click();
  URL.revokeObjectURL(url);
}

function lastNedJSON(name) {
  const checkState = CHECK_CACHE[name];
  const statusData = STATUS_DATA?.serier?.find(s => s.name === name);
  const result = checkState?.result || (statusData ? {
    mangler: statusData.mangler || [],
    checkedAt: statusData.checkedAt,
    nb: statusData.nb,
  } : null);

  if (!result || !result.mangler?.length) {
    alert('Ingen mangler å laste ned. Kjør sjekk først.');
    return;
  }

  const payload = {
    serie: name,
    sjekketTidspunkt: result.checkedAt,
    nbSisteAar: result.nb?.latestYear,
    antallMangler: result.mangler.length,
    mangler: result.mangler,
  };

  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `mangler_${name.replace(/[^a-zA-Z0-9æøåÆØÅ]/g, '_')}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

// ── NB API – direkte (ingen server) ───────────────────────────────────────────
const NB_API = 'https://api.nb.no/catalog/v1/items';

async function hentNBOgVent(issn, title = '', mmsId = '') {
  if (!issn && !title) return;
  try {
    let page = 0, items = [], total = 0, sokeMetode = '';
    do {
      const q = issn ? `issn:${issn}` : `series:"${title}"`;
      sokeMetode = q;
      const params = new URLSearchParams({ q, size: 50, sort: 'date,desc', page });
      const r = await fetch(`${NB_API}?${params}`);
      const d = await r.json();
      if (d.error) break;
      total = d.page?.totalElements || 0;

      const batch = d._embedded?.items || [];
      items.push(...batch.map(item => ({
        title: item.metadata?.title || '–',
        year:  item.metadata?.originInfo?.issued || '–',
        oaiId: item.metadata?.identifiers?.oaiId || '',
        isbn:  (item.metadata?.identifiers?.isbn13 ||
                item.metadata?.identifiers?.isbn10 || [''])[0] || '',
      })));
      page++;
      if (items.length >= 200 || page * 50 >= total) break;
    } while (true);

    const byYear = {};
    for (const i of items) {
      const y = String(i.year);
      if (/^\d{4}$/.test(y)) byYear[y] = (byYear[y] || 0) + 1;
    }
    const years = Object.keys(byYear).map(Number).filter(y => !isNaN(y));
    const cacheKey = issn || title;
    NB_CACHE[cacheKey] = { total, items, byYear, latestYear: years.length ? Math.max(...years) : null, sokeMetode, lagretTid: new Date().toISOString() };
    lagreNBCache();
  } catch(e) {
    const cacheKey = issn || title;
    NB_CACHE[cacheKey] = { total: 0, items: [], byYear: {}, latestYear: null, error: String(e), lagretTid: new Date().toISOString() };
    lagreNBCache();
  }
}

async function hentNB(issn, name) {
  const serie = SERIER.find(s => s.name === name);
  const cacheKey = issn || name;
  delete NB_CACHE[cacheKey];
  toast(`Henter NB-data for ${name}…`);
  await hentNBOgVent(issn, name, serie?.mmsId || '');
  renderSidebar();
  if (ACTIVE_SERIE === name) {
    const serie = SERIER.find(s => s.name === name);
    if (serie) renderSerieView(serie);
  } else {
    visOverview();
  }
  document.getElementById('last-check').textContent = 'Oppdatert ' + new Date().toLocaleTimeString('nb-NO');
}

let PAUSE_FLAG = false;

function togglePause() {
  PAUSE_FLAG = !PAUSE_FLAG;
  const pauseBtn = document.getElementById('btn-pause');
  if (pauseBtn) pauseBtn.innerHTML = PAUSE_FLAG ? '▶ Fortsett' : '⏸ Pause';
}

async function ventOmPausert() {
  while (PAUSE_FLAG) await new Promise(r => setTimeout(r, 300));
}

function lastNedAlleMangler() {
  const alle = [];
  for (const [name, cc] of Object.entries(CHECK_CACHE)) {
    const mangler = cc?.result?.mangler;
    if (!mangler?.length) continue;
    for (const m of mangler) {
      alle.push({ ...m, _serie: name, _sjekketTidspunkt: cc.result.checkedAt });
    }
  }
  if (!alle.length) {
    toast('Ingen mangler å laste ned. Kjør sjekk først.');
    return;
  }
  const dato = new Date().toISOString().slice(0, 10);
  const payload = {
    generertTidspunkt: new Date().toISOString(),
    antallMangler: alle.length,
    antallSerier: new Set(alle.map(m => m._serie)).size,
    mangler: alle,
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = `alle_mangler_${dato}.json`; a.click();
  URL.revokeObjectURL(url);
  toast(`Lastet ned ${alle.length} mangler fra ${payload.antallSerier} serier`);
}

async function oppdaterAlle() {
  const btn = document.getElementById('btn-oppdater');
  const pauseBtn = document.getElementById('btn-pause');
  PAUSE_FLAG = false;
  btn.disabled = true;
  if (pauseBtn) { pauseBtn.style.display = ''; pauseBtn.innerHTML = '⏸ Pause'; }
  const aktive = SERIER.filter(s => s.active !== false);
  const totalt = aktive.length;

  // Steg 1: NB-beholdning for alle serier
  for (let i = 0; i < aktive.length; i++) {
    await ventOmPausert();
    const s = aktive[i];
    const cacheKey = s.issnPrint || s.name;
    delete NB_CACHE[cacheKey];
    btn.innerHTML = `<span class="spinner"></span> NB ${i+1}/${totalt}: ${s.name.slice(0,28)}…`;
    await hentNBOgVent(s.issnPrint, s.name, s.mmsId || '');
    renderSidebar();
  }

  // Steg 2: Sjekk mangler (NVA / utgivers side)
  for (let i = 0; i < aktive.length; i++) {
    await ventOmPausert();
    const s = aktive[i];
    if (!s.publisher && !s.publisherUrl) continue;
    btn.innerHTML = `<span class="spinner"></span> Mangler ${i+1}/${totalt}: ${s.name.slice(0,28)}…`;
    await kjorSjekk(s.name);
  }

  PAUSE_FLAG = false;
  btn.disabled = false;
  btn.innerHTML = '🔄 Oppdater alle';
  if (pauseBtn) pauseBtn.style.display = 'none';
  document.getElementById('last-check').textContent = 'Oppdatert ' + new Date().toLocaleTimeString('nb-NO');

  // Vis oppsummering av endringer
  const endrede = Object.entries(SESSION_DIFF)
    .filter(([, d]) => !d.forsteGang && (d.nyeMangler > 0 || d.lostMangler > 0));
  if (endrede.length > 0) {
    const totNye    = endrede.reduce((s, [, d]) => s + d.nyeMangler,  0);
    const totLoster = endrede.reduce((s, [, d]) => s + d.lostMangler, 0);
    const deler = [];
    if (totNye    > 0) deler.push(`${totNye} nye mangler`);
    if (totLoster > 0) deler.push(`${totLoster} løste mangler`);
    toast(`Endringer siden sist: ${deler.join(', ')} (${endrede.length} serier)`);
  } else {
    toast('Ingen endringer siden forrige oppdatering');
  }

  if (!ACTIVE_SERIE) visOverview();
  else { const s = SERIER.find(x => x.name === ACTIVE_SERIE); if(s) renderSerieView(s); }
}

// ── Hjelpere ───────────────────────────────────────────────────────────────────
function getStatus(serie) {
  const cc = CHECK_CACHE[serie.name];
  if (cc?.loading) return 'unknown';
  if (cc?.result) return cc.result.mangler?.length > 0 ? 'warn' : 'ok';
  return 'unknown';
}

function esc(s) { return String(s || '').replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

function fmtDato(iso) {
  if (!iso) return '–';
  try { return new Date(iso).toLocaleString('nb-NO', { dateStyle:'short', timeStyle:'short' }); }
  catch { return iso; }
}

let toastTimer;
function toast(msg, dur = 3000) {
  clearTimeout(toastTimer);
  let el = document.querySelector('.toast');
  if (!el) { el = document.createElement('div'); el.className = 'toast'; document.body.appendChild(el); }
  el.textContent = msg;
  el.style.display = 'block';
  toastTimer = setTimeout(() => { if(el) el.style.display = 'none'; }, dur);
}

// ── Start ──────────────────────────────────────────────────────────────────────
init();
</script>
